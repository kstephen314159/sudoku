<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver UI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Sudoku Solver</h1>
      <div class="controls">
        <div class="file-input-group">
          <label for="puzzle-file">Load Puzzle:</label>
          <input 
            type="file" 
            id="puzzle-file" 
            accept=".json" 
            title="Select a sudoku puzzle JSON file"
          >
          <span id="file-name" class="file-name"></span>
        </div>
        <button id="find-next-move" class="find-next-move" disabled>Find Next Move</button>
      </div>
    </header>

    <main>
      <div class="board-section">
        <div id="board" class="board"></div>
      </div>

      <aside class="info-panel">
        <div class="last-move-info">
          <h3>Last Move</h3>
          <div id="last-move-text" class="last-move-text">
            Load a puzzle to see solver output
          </div>
        </div>

        <div class="moves-list">
          <h3>Moves Detail</h3>
          <div id="moves-detail" class="moves-detail">
            <p class="placeholder">No moves yet</p>
          </div>
        </div>

        <div class="stats">
          <h3>Board Stats</h3>
          <div>
            <p><strong>Solved:</strong> <span id="stat-solved">0</span> / 81</p>
            <p><strong>Candidates:</strong> <span id="stat-candidates">0</span></p>
          </div>
        </div>
      </aside>
    </main>

    <div id="error-message" class="error-message"></div>
  </div>

  <script type="module" src="./ui.ts"></script>
</body>
</html>
